<!-- 双语切换 JS 已整合在这里 -->
<script>
const langToggle = document.getElementById('langToggle');

window.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('lang') || 'tc';
  setLang(savedLang);
});

langToggle.addEventListener('click', () => {
  const current = localStorage.getItem('lang') || 'tc';
  const newLang = current === 'tc' ? 'en' : 'tc';
  setLang(newLang);
});

function setLang(lang) {
  if (lang === 'en') {
    document.querySelectorAll('.lang-tc').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = 'inline');
    langToggle.textContent = 'EN / 繁';
    document.documentElement.lang = 'en';
  } else {
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.lang-tc').forEach(el => el.style.display = 'inline');
    langToggle.textContent = '繁 / EN';
    document.documentElement.lang = 'zh-Hant';
  }
  localStorage.setItem('lang', lang);
}
</script>
